<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>星穹铁道性格测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0c0c23 0%, #1a1a40 50%, #2a2a5a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: auto;
            overflow-y: auto;
            position: relative;
            padding: 20px;
        }

        body.centered {
            align-items: center;
        }

        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            animation: twinkle var(--duration, 2s) infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% {
                opacity: var(--opacity, 0.5);
                transform: scale(var(--scale, 1));
            }
            50% {
                opacity: 1;
                transform: scale(calc(var(--scale, 1) * 1.2));
            }
        }

        .constellation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .constellation-line {
            position: absolute;
            background: linear-gradient(90deg, transparent, rgba(147, 51, 234, 0.6), transparent);
            height: 1px;
            animation: pulse 3s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 0.3;
            }
            50% {
                opacity: 0.8;
            }
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: rgba(147, 51, 234, 0.8);
            border-radius: 50%;
            animation: float 15s infinite;
            box-shadow: 0 0 10px rgba(147, 51, 234, 0.8);
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) rotate(720deg);
                opacity: 0;
            }
        }

        .container {
            text-align: center;
            z-index: 10;
            padding: 20px;
            width: 100%;
            max-width: 1400px;
            position: relative;
        }

        .start-screen-content {
            position: relative;
            z-index: 10;
        }

        .railway-icons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .railway-icon {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            background: linear-gradient(135deg, rgba(147, 51, 234, 0.3), rgba(59, 130, 246, 0.3));
            border: 2px solid rgba(147, 51, 234, 0.5);
            animation: iconPulse 2s ease-in-out infinite;
            box-shadow: 0 0 20px rgba(147, 51, 234, 0.4);
        }

        .railway-icon:nth-child(1) { animation-delay: 0s; }
        .railway-icon:nth-child(2) { animation-delay: 0.4s; }
        .railway-icon:nth-child(3) { animation-delay: 0.8s; }
        .railway-icon:nth-child(4) { animation-delay: 1.2s; }
        .railway-icon:nth-child(5) { animation-delay: 1.6s; }

        @keyframes iconPulse {
            0%, 100% {
                transform: scale(1);
                box-shadow: 0 0 20px rgba(147, 51, 234, 0.4);
            }
            50% {
                transform: scale(1.1);
                box-shadow: 0 0 30px rgba(147, 51, 234, 0.6);
            }
        }

        .title {
            font-size: 3.2rem;
            background: linear-gradient(135deg, #ff6ad5 0%, #8b5cf6 50%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: none;
            margin-bottom: 20px;
            letter-spacing: 3px;
            position: relative;
            filter: drop-shadow(0 0 20px rgba(147, 51, 234, 0.5));
            animation: titleFlicker 4s ease-in-out infinite;
            text-transform: uppercase;
        }
        
        .title::after {
            content: '星穹铁道性格测试';
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            background: linear-gradient(135deg, #ff6ad5 0%, #8b5cf6 50%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: blur(20px);
            opacity: 0.5;
            z-index: -1;
        }

        @keyframes titleFlicker {
            0%, 100% {
                filter: drop-shadow(0 0 20px rgba(147, 51, 234, 0.5));
            }
            50% {
                filter: drop-shadow(0 0 40px rgba(147, 51, 234, 0.8)) drop-shadow(0 0 60px rgba(59, 130, 246, 0.4));
            }
        }

        .subtitle-container {
            margin-bottom: 45px;
        }

        .subtitle {
            font-size: 1.25rem;
            color: #ff6ad5;
            margin-bottom: 10px;
            opacity: 0.95;
            text-shadow: 0 0 10px rgba(147, 51, 234, 0.5);
        }

        .subtitle-detail {
            font-size: 1.05rem;
            color: rgba(59, 130, 246, 0.8);
            margin-top: 10px;
            font-style: italic;
        }

        .start-screen-footer {
            margin-top: 50px;
            padding-top: 25px;
            border-top: 1px solid rgba(147, 51, 234, 0.3);
        }

        .footer-text {
            font-size: 0.9rem;
            color: rgba(147, 51, 234, 0.9);
            margin: 0;
            animation: textGlow 2s ease-in-out infinite;
            text-shadow: 0 0 10px rgba(147, 51, 234, 0.5);
        }

        @keyframes textGlow {
            0%, 100% {
                opacity: 0.7;
                text-shadow: 0 0 10px rgba(147, 51, 234, 0.5);
            }
            50% {
                opacity: 1;
                text-shadow: 0 0 20px rgba(147, 51, 234, 0.8);
            }
        }

        .start-btn {
            background: linear-gradient(135deg, #8b5cf6 0%, #3b82f6 100%);
            border: 2px solid rgba(147, 51, 234, 0.6);
            padding: 20px 65px;
            font-size: 1.35rem;
            font-weight: bold;
            color: #fff;
            cursor: pointer;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(147, 51, 234, 0.5),
                        inset 0 1px 3px rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
            overflow: hidden;
        }

        .start-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s;
        }

        .start-btn:hover::before {
            left: 100%;
        }

        .start-btn:hover {
            transform: translateY(-4px) scale(1.03);
            box-shadow: 0 0 50px rgba(147, 51, 234, 0.7),
                        inset 0 1px 3px rgba(255, 255, 255, 0.2);
            border-color: rgba(147, 51, 234, 0.9);
        }

        .start-btn:active {
            transform: translateY(-2px) scale(1.01);
        }

        .decoration {
            position: fixed;
            width: 200px;
            height: 200px;
            border: 2px solid rgba(147, 51, 234, 0.2);
            border-radius: 50%;
            animation: rotate 20s linear infinite;
            z-index: 0;
            pointer-events: none;
        }

        .decoration:nth-child(1) {
            top: -100px;
            left: -100px;
            border-color: rgba(255, 106, 213, 0.2);
        }

        .decoration:nth-child(2) {
            bottom: -100px;
            right: -100px;
            border-color: rgba(59, 130, 246, 0.2);
            animation-direction: reverse;
        }

        @keyframes rotate {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        .quiz-container {
            display: none;
            background: linear-gradient(135deg, rgba(147, 51, 234, 0.08) 0%, rgba(59, 130, 246, 0.05) 100%);
            border-radius: 12px;
            padding: 20px;
            backdrop-filter: blur(15px);
            border: 2px solid rgba(147, 51, 234, 0.3);
            text-align: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(147, 51, 234, 0.2), 0 0 60px rgba(59, 130, 246, 0.1);
            width: 100%;
        }

        .quiz-header {
            margin-bottom: 15px;
        }

        .progress-bar {
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            margin-bottom: 25px;
            overflow: hidden;
            box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.5);
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #8b5cf6, #3b82f6, #8b5cf6);
            background-size: 200% 100%;
            border-radius: 3px;
            transition: width 0.5s ease;
            animation: shimmer 2s linear infinite;
            box-shadow: 0 0 10px rgba(147, 51, 234, 0.6);
        }
        
        @keyframes shimmer {
            0% {
                background-position: -200% 0;
            }
            100% {
                background-position: 200% 0;
            }
        }

        .question-number {
            background: linear-gradient(135deg, #ff6ad5 0%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 1.15rem;
            margin-bottom: 10px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .encouragement-text {
            color: rgba(59, 130, 246, 0.9);
            font-size: 0.95rem;
            font-style: italic;
            margin-bottom: 15px;
            animation: fadeIn 0.5s ease;
        }

        .question-text {
            color: #e8eef5;
            font-size: 1.45rem;
            margin-bottom: 40px;
            line-height: 1.7;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 40px;
        }

        .option {
            background: linear-gradient(135deg, rgba(147, 51, 234, 0.1) 0%, rgba(59, 130, 246, 0.05) 100%);
            border: 2px solid rgba(147, 51, 234, 0.25);
            padding: 20px 22px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: left;
            color: #d4dce8;
            font-size: 1.1rem;
            min-height: 68px;
            display: flex;
            align-items: center;
            width: 100%;
            max-width: 100%;
            position: relative;
            overflow: visible;
        }

        .option::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(147, 51, 234, 0.1), transparent);
            transition: left 0.5s ease;
        }

        .option:hover {
            background: linear-gradient(135deg, rgba(147, 51, 234, 0.2) 0%, rgba(147, 51, 234, 0.1) 100%);
            border-color: rgba(147, 51, 234, 0.6);
            transform: translateX(4px);
            box-shadow: 0 0 20px rgba(147, 51, 234, 0.2);
        }

        .option:hover::before {
            left: 100%;
        }

        .option.selected {
            background: linear-gradient(135deg, rgba(147, 51, 234, 0.3) 0%, rgba(147, 51, 234, 0.15) 100%);
            border-color: #8b5cf6;
            box-shadow: 0 0 20px rgba(147, 51, 234, 0.3), inset 0 0 10px rgba(147, 51, 234, 0.1);
        }

        .option-letter {
            display: inline-block;
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #8b5cf6, #3b82f6);
            color: #fff;
            border-radius: 50%;
            text-align: center;
            line-height: 40px;
            font-weight: bold;
            margin-right: 16px;
            flex-shrink: 0;
            box-shadow: 0 0 15px rgba(147, 51, 234, 0.5);
            border: 1px solid rgba(147, 51, 234, 0.4);
        }

        .option-feedback {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            background: linear-gradient(135deg, #8b5cf6, #3b82f6);
            color: #fff;
            padding: 7px 14px;
            border-radius: 15px;
            font-weight: bold;
            font-size: 0.8rem;
            z-index: 10;
            animation: feedbackSlide 0.4s ease;
            box-shadow: 0 0 15px rgba(147, 51, 234, 0.5);
            white-space: nowrap;
        }

        @keyframes feedbackSlide {
            0% {
                opacity: 0;
                transform: translateY(-50%) translateX(15px);
            }
            100% {
                opacity: 1;
                transform: translateY(-50%) translateX(0);
            }
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            gap: 15px;
        }

        .nav-btn {
            background: linear-gradient(135deg, rgba(147, 51, 234, 0.15) 0%, rgba(59, 130, 246, 0.1) 100%);
            border: 2px solid rgba(147, 51, 234, 0.4);
            padding: 15px 42px;
            font-size: 1.05rem;
            font-weight: bold;
            color: #8b5cf6;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s ease;
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        .nav-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(147, 51, 234, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .nav-btn:hover:not(:disabled) {
            background: linear-gradient(135deg, rgba(147, 51, 234, 0.25) 0%, rgba(147, 51, 234, 0.15) 100%);
            border-color: #8b5cf6;
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(147, 51, 234, 0.3);
        }

        .nav-btn:hover:not(:disabled)::before {
            left: 100%;
        }

        .nav-btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }

        .nav-btn.primary {
            background: linear-gradient(135deg, #8b5cf6, #3b82f6);
            border-color: transparent;
            color: #fff;
            box-shadow: 0 0 20px rgba(147, 51, 234, 0.4);
        }

        .nav-btn.primary:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 0 30px rgba(147, 51, 234, 0.5);
        }

        .fun-tip {
            color: rgba(59, 130, 246, 0.7);
            font-size: 0.8rem;
            text-align: center;
            margin-top: 18px;
            padding: 10px;
            background: rgba(147, 51, 234, 0.08);
            border-radius: 8px;
            border: 1px solid rgba(147, 51, 234, 0.2);
            animation: fadeIn 0.5s ease;
        }

        .result-container {
            display: none;
            background: linear-gradient(135deg, rgba(147, 51, 234, 0.1) 0%, rgba(59, 130, 246, 0.05) 100%);
            border-radius: 12px;
            padding: 20px;
            backdrop-filter: blur(15px);
            border: 2px solid rgba(147, 51, 234, 0.35);
            text-align: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(147, 51, 234, 0.2), 0 0 80px rgba(59, 130, 246, 0.1);
            width: 100%;
        }

        .result-type {
            font-size: 1.6rem;
            background: linear-gradient(135deg, #ff6ad5 0%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
            letter-spacing: 3px;
            font-weight: bold;
            position: relative;
            z-index: 1;
        }

        .result-character {
            font-size: 3.6rem;
            background: linear-gradient(135deg, #fff 0%, #8b5cf6 50%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 30px;
            font-weight: bold;
            position: relative;
            z-index: 1;
            filter: drop-shadow(0 0 20px rgba(147, 51, 234, 0.5));
            animation: characterPulse 3s ease-in-out infinite;
        }

        @keyframes characterPulse {
            0%, 100% {
                filter: drop-shadow(0 0 20px rgba(147, 51, 234, 0.5));
            }
            50% {
                filter: drop-shadow(0 0 40px rgba(147, 51, 234, 0.7));
            }
        }

        .personality-analysis {
            background: linear-gradient(135deg, rgba(147, 51, 234, 0.12) 0%, rgba(59, 130, 246, 0.08) 100%);
            border: 2px solid rgba(147, 51, 234, 0.35);
            border-radius: 10px;
            padding: 22px;
            margin-bottom: 30px;
            text-align: left;
            line-height: 1.8;
            box-shadow: 0 0 20px rgba(147, 51, 234, 0.15);
            position: relative;
            overflow: hidden;
        }

        .personality-analysis::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, #8b5cf6, #3b82f6);
            border-radius: 10px 10px 0 0;
        }

        .personality-analysis-title {
            background: linear-gradient(135deg, #ff6ad5 0%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 1.35rem;
            font-weight: bold;
            margin-bottom: 15px;
            text-align: center;
            letter-spacing: 1px;
        }

        .personality-analysis-text {
            color: #d4dce8;
            font-size: 1.15rem;
            position: relative;
            z-index: 1;
        }

        .character-intro {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.1) 0%, rgba(147, 51, 234, 0.08) 100%);
            border: 2px solid rgba(59, 130, 246, 0.35);
            border-radius: 10px;
            padding: 22px;
            margin-bottom: 40px;
            text-align: left;
            line-height: 1.8;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.15);
            position: relative;
            overflow: hidden;
        }

        .character-intro::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            border-radius: 10px 10px 0 0;
        }

        .character-intro-title {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 1.35rem;
            font-weight: bold;
            margin-bottom: 15px;
            text-align: center;
            letter-spacing: 1px;
        }

        .character-intro-text {
            color: #d4dce8;
            font-size: 1.1rem;
        }

        .character-traits {
            background: linear-gradient(135deg, rgba(147, 51, 234, 0.1) 0%, rgba(59, 130, 246, 0.05) 100%);
            border: 2px solid rgba(147, 51, 234, 0.35);
            border-radius: 10px;
            padding: 22px;
            margin-bottom: 40px;
            text-align: left;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(147, 51, 234, 0.15);
        }

        .character-traits::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, #8b5cf6, #3b82f6);
            border-radius: 10px 10px 0 0;
        }

        .character-traits-title {
            background: linear-gradient(135deg, #ff6ad5 0%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 1.35rem;
            font-weight: bold;
            margin-bottom: 20px;
            text-align: center;
            letter-spacing: 1px;
        }

        .trait-item {
            margin-bottom: 15px;
            display: flex;
            align-items: center;
        }

        .trait-label {
            width: 120px;
            color: #d4dce8;
            font-weight: bold;
            font-size: 1.05rem;
        }

        .trait-bar-container {
            flex: 1;
            height: 14px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            overflow: hidden;
            margin: 0 15px;
            box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.5);
        }

        .trait-bar {
            height: 100%;
            background: linear-gradient(90deg, #8b5cf6, #3b82f6);
            border-radius: 6px;
            transition: width 1s ease-out;
            box-shadow: 0 0 10px rgba(147, 51, 234, 0.6);
        }

        .trait-value {
            width: 40px;
            color: #d4dce8;
            font-weight: bold;
            text-align: right;
            font-size: 1.05rem;
        }

        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(28, 28, 56, 0.95);
            border: 2px solid rgba(147, 51, 234, 0.5);
            border-radius: 15px;
            padding: 30px 50px;
            color: #e6e6fa;
            font-size: 1.2rem;
            z-index: 1000;
            animation: fadeIn 0.3s ease;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .toast-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 999;
            animation: fadeIn 0.3s ease;
        }

        .toast-close {
            margin-top: 20px;
            background: linear-gradient(135deg, #8b5cf6, #3b82f6);
            border: none;
            padding: 10px 30px;
            font-size: 1rem;
            font-weight: bold;
            color: #fff;
            cursor: pointer;
            border-radius: 25px;
            transition: all 0.3s ease;
        }

        .toast-close:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(147, 51, 234, 0.4);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @media (max-width: 768px) {
            body {
                padding: 20px 10px;

        function createStars() {
            const starsContainer = document.getElementById('stars');
            const starCount = 150;

            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.width = Math.random() * 3 + 1 + 'px';
                star.style.height = star.style.width;
                star.style.setProperty('--duration', Math.random() * 3 + 1 + 's');
                star.style.setProperty('--opacity', Math.random() * 0.8 + 0.2);
                star.style.setProperty('--scale', Math.random() * 0.5 + 0.5);
                starsContainer.appendChild(star);
            }
        }

        function showQuestion() {
            const q = questions[currentQuestion];
            document.getElementById('question-number').textContent = `第 ${currentQuestion + 1}/${questions.length} 题`;
            document.getElementById('question-text').textContent = q.text;
            
            const optionsContainer = document.getElementById('options');
            optionsContainer.innerHTML = '';
            
            const letters = ['A', 'B', 'C', 'D'];
            q.options.forEach((opt, idx) => {
                const optionDiv = document.createElement('div');
                optionDiv.className = 'option';
                if (answers[currentQuestion] === idx) {
                    optionDiv.classList.add('selected');
                }
                optionDiv.innerHTML = `<span class="option-letter">${letters[idx]}</span>${opt}`;
                optionDiv.onclick = () => selectOption(idx);
                optionsContainer.appendChild(optionDiv);
            });

            updateProgress();
            updateButtons();
        }

        function selectOption(idx) {
            answers[currentQuestion] = idx;
            const options = document.querySelectorAll('.option');
            options.forEach((opt, i) => {
                opt.classList.toggle('selected', i === idx);
            });
        }

        function prevQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                showQuestion();
            }
        }

        function showToast(message) {
            document.getElementById('toast-message').textContent = message;
            document.getElementById('toast-overlay').style.display = 'block';
            document.getElementById('toast').style.display = 'block';
        }

        function hideToast() {
            document.getElementById('toast-overlay').style.display = 'none';
            document.getElementById('toast').style.display = 'none';
        }

        function nextQuestion() {
            if (answers[currentQuestion] === undefined) {
                showToast('请选择一个选项后再继续！');
                return;
            }
            
            if (currentQuestion < questions.length - 1) {
                currentQuestion++;
                showQuestion();
            } else {
                finishSurvey();
            }
        }

        function updateProgress() {
            const progress = ((currentQuestion + 1) / questions.length) * 100;
            document.getElementById('progress-fill').style.width = progress + '%';
        }

        function updateButtons() {
            document.getElementById('prev-btn').disabled = currentQuestion === 0;
